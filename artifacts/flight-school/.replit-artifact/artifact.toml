kind = "web"
previewPath = "/"
title = "Accelerated Flight School"
version = "1.0.0"
id = "artifacts/flight-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25224

[services.development]
run = "pnpm --filter @workspace/flight-school run dev"

# Production is served by a small Node process (serve.mjs), NOT Replit static
# hosting. Static deployments support only internal rewrites (no status change),
# so trailing-slash URLs (e.g. /foo/) could never return a real 301 — they fell
# through the SPA catch-all to the homepage and served the wrong title/meta.
# serve.mjs issues genuine 301 redirects for every prerendered page generically,
# so new pages are covered automatically with no per-URL config. Dev still uses
# Vite (above) for HMR.
[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/flight-school", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/flight-school/serve.mjs"]

[services.production.run.env]
PORT = "25224"
NODE_ENV = "production"

[services.production.health.startup]
path = "/"
