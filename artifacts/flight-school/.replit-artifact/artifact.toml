kind = "web"
previewPath = "/"
title = "Accelerated Flight School"
version = "1.0.0"
id = "artifacts/flight-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25224

[services.development]
run = "pnpm --filter @workspace/flight-school run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flight-school", "run", "build" ]
publicDir = "artifacts/flight-school/dist/public"
serve = "static"

# Flat-file prerendering: every route is served from /<route>.html (no directory),
# so the host never 301-redirects /<route> -> /<route>/ and the SPA catch-all
# cannot hijack the clean URL. Real assets shadow these rewrites and serve
# directly. One rewrite per route keeps the rule count within the static-deploy
# limit (the trailing-slash variants doubled it and broke publishing). The SPA
# catch-all MUST stay LAST.

[[services.production.rewrites]]
from = "/discovery-flight-van-nuys"
to = "/discovery-flight-van-nuys.html"

