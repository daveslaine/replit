kind = "web"
previewPath = "/"
title = "Accelerated Flight School"
version = "1.0.0"
id = "artifacts/flight-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25224

[services.development]
run = "pnpm --filter @workspace/flight-school run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flight-school", "run", "build" ]
publicDir = "artifacts/flight-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25224"
BASE_PATH = "/"
